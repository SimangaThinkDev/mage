name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: |
          mkdir -p deb/DEBIAN deb/usr/local/bin deb/usr/local/lib/mage
          cp main.sh deb/usr/local/bin/mage
          cp lib/*.sh deb/usr/local/lib/mage/
          chmod +x deb/usr/local/bin/mage
          cat > deb/DEBIAN/control <<EOF
          Package: mage
          Version: ${GITHUB_REF_NAME#v}
          Section: utils
          Priority: optional
          Architecture: all
          Maintainer: SimangaThinkDev
          Depends: tar, coreutils
          Description: Installs .AppImage and .tar archives with a terminal command and desktop entry
          EOF
          dpkg-deb --build deb mage.deb

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: mage.deb
